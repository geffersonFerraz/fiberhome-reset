name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build Linux (amd64)
        run: fyne-cross linux --arch=amd64 --app-id=io.github.gfz.reset-fiber-home

      - name: Build Windows (amd64)
        run: fyne-cross windows --arch=amd64 --app-id=io.github.gfz.reset-fiber-home

      - name: Package artifacts
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p release
          cp fyne-cross/dist/linux-amd64/*.tar.xz   release/reset-fiber-home_${VERSION}_linux_amd64.tar.xz
          cp fyne-cross/dist/windows-amd64/*.zip    release/reset-fiber-home_${VERSION}_windows_amd64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
