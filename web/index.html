<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiber Home — Reset</title>
  <style>
    :root {
      --bg:       #090d12;
      --surface:  #0d1117;
      --s2:       #161b22;
      --s3:       #1c2128;
      --border:   #21262d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --green:    #3fb950;
      --red:      #f85149;
      --amber:    #d29922;
      --blue:     #58a6ff;
      --cyan:     #79c0ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 40px 20px 60px;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */

    .page { width: 100%; max-width: 820px; }

    .page-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
    }

    .logo {
      width: 54px; height: 54px;
      background: linear-gradient(135deg, #112044 0%, #0b1a3e 100%);
      border: 1px solid #1e3464;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 28px;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(88,166,255,.15);
    }

    .page-header h1 {
      font-size: 22px; font-weight: 700; letter-spacing: -.4px;
    }
    .page-header p { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* ── Card ────────────────────────────────────────────────────────────── */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .row {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }
    .row:last-child { border-bottom: none; }

    /* ── Control row ─────────────────────────────────────────────────────── */

    .control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-group {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background .3s;
    }
    .dot.running { background: var(--blue); animation: blink 1.1s ease-in-out infinite; }
    .dot.success { background: var(--green); }
    .dot.error   { background: var(--red); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: .2; }
    }

    .chip {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      font-size: 12px;
      color: var(--cyan);
    }

    /* ── Buttons ──────────────────────────────────────────────────────────── */

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s, transform .1s, box-shadow .15s;
    }
    .btn:hover:not(:disabled)  { opacity: .87; }
    .btn:active:not(:disabled) { transform: scale(.96); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .btn-start {
      background: var(--red);
      color: #fff;
      box-shadow: 0 2px 10px rgba(248,81,73,.3);
    }
    .btn-start:hover:not(:disabled) {
      box-shadow: 0 4px 18px rgba(248,81,73,.45);
    }

    .btn-yes {
      background: var(--green);
      color: #0d1117;
    }
    .btn-no {
      background: var(--s2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ── Log terminal ─────────────────────────────────────────────────────── */

    .log-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .log-header .dot-row {
      display: flex; gap: 5px;
    }
    .log-header .dot-row span {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .dot-row .d1 { background: #f85149; }
    .dot-row .d2 { background: #d29922; }
    .dot-row .d3 { background: #3fb950; }

    .terminal {
      background: #010409;
      padding: 16px 18px;
      height: 360px;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .terminal:empty::before {
      content: "Aguardando início da operação...";
      color: var(--muted);
      font-style: italic;
    }

    .line { word-break: break-all; }
    .line.info    { color: #8b949e; }
    .line.success { color: var(--green); }
    .line.warning { color: var(--amber); }
    .line.error   { color: var(--red); }

    /* ── Question panel ───────────────────────────────────────────────────── */

    .question {
      display: none;
      padding: 18px 22px;
      background: rgba(210,153,34,.06);
      border-top: 1px solid rgba(210,153,34,.4);
      animation: slideDown .2s ease;
    }
    .question.visible { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .question-label {
      font-size: 11px; font-weight: 700; letter-spacing: .9px;
      text-transform: uppercase; color: var(--amber);
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 15px; color: var(--text);
      line-height: 1.5; margin-bottom: 16px;
    }

    .question-actions { display: flex; gap: 10px; }

    /* ── Result panel ─────────────────────────────────────────────────────── */

    .result {
      display: none;
      padding: 28px 22px;
      text-align: center;
      border-top: 1px solid var(--border);
      animation: fadeIn .35s ease;
    }
    .result.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-glyph {
      font-size: 44px; margin-bottom: 14px; line-height: 1;
    }

    .result-title {
      font-size: 18px; font-weight: 700; letter-spacing: -.3px;
      margin-bottom: 8px;
    }

    .result-body {
      font-size: 14px; color: var(--muted);
      max-width: 500px; margin: 0 auto; line-height: 1.6;
    }

    .result.ok  .result-title { color: var(--green); }
    .result.err .result-title { color: var(--red); }
  </style>
</head>
<body>
  <div class="page">

    <div class="page-header">
      <div class="logo">📡</div>
      <div>
        <h1>Fiber Home Reset</h1>
        <p>Restauração das configurações de fábrica do roteador</p>
      </div>
    </div>

    <div class="card">

      <!-- Control -->
      <div class="row">
        <div class="control">
          <button class="btn btn-start" id="btnStart" onclick="startReset()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M7 1a6 6 0 1 0 0 12A6 6 0 0 0 7 1z"/>
              <path d="M9.5 4.5 5 7l4.5 2.5V4.5z" fill="currentColor" stroke="none"/>
            </svg>
            Iniciar Reset
          </button>
          <div class="status-group">
            <div class="dot" id="dot"></div>
            <span id="statusText">Aguardando</span>
            <span class="chip">192.168.1.1:8090</span>
          </div>
        </div>
      </div>

      <!-- Terminal header -->
      <div class="log-header">
        <div class="dot-row">
          <span class="d1"></span>
          <span class="d2"></span>
          <span class="d3"></span>
        </div>
        Output
      </div>

      <!-- Terminal body -->
      <div class="terminal" id="terminal"></div>

      <!-- Question -->
      <div class="question" id="question">
        <div class="question-label">⚠ Ação necessária</div>
        <div class="question-text" id="questionText"></div>
        <div class="question-actions">
          <button class="btn btn-yes" onclick="respond(true)">Sim, prosseguir</button>
          <button class="btn btn-no"  onclick="respond(false)">Não, cancelar</button>
        </div>
      </div>

      <!-- Result -->
      <div class="result" id="result">
        <div class="result-glyph" id="resultGlyph"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-body"  id="resultBody"></div>
      </div>

    </div>
  </div>

  <script>
    let es = null;

    function setStatus(state, text) {
      document.getElementById('dot').className = 'dot ' + state;
      document.getElementById('statusText').textContent = text;
    }

    function appendLine(level, text) {
      const t = document.getElementById('terminal');
      const el = document.createElement('div');
      el.className = 'line ' + level;
      el.textContent = text;
      t.appendChild(el);
      t.scrollTop = t.scrollHeight;
    }

    function showQuestion(text) {
      document.getElementById('questionText').textContent = text;
      document.getElementById('question').classList.add('visible');
    }

    function hideQuestion() {
      document.getElementById('question').classList.remove('visible');
    }

    function showResult(ok, msg) {
      const el = document.getElementById('result');
      el.className = 'result visible ' + (ok ? 'ok' : 'err');
      document.getElementById('resultGlyph').textContent = ok ? '✓' : '✕';
      document.getElementById('resultTitle').textContent = ok ? 'Reset concluído' : 'Erro na operação';
      document.getElementById('resultBody').textContent = msg;
    }

    async function startReset() {
      const btn = document.getElementById('btnStart');
      btn.disabled = true;
      document.getElementById('terminal').innerHTML = '';
      document.getElementById('result').className = 'result';
      hideQuestion();
      setStatus('running', 'Processando...');

      const res = await fetch('/api/start', { method: 'POST' });
      if (!res.ok) {
        setStatus('error', res.status === 409 ? 'Já em execução' : 'Erro ao iniciar');
        btn.disabled = false;
        return;
      }

      if (es) es.close();
      es = new EventSource('/api/events');

      es.onmessage = ({ data }) => {
        const ev = JSON.parse(data);
        switch (ev.kind) {
          case 'log':
            appendLine(ev.level, ev.message);
            break;
          case 'question':
            showQuestion(ev.message);
            break;
          case 'done': {
            hideQuestion();
            const ok = ev.level === 'success';
            setStatus(ok ? 'success' : 'error', ok ? 'Concluído' : 'Erro');
            showResult(ok, ev.message);
            document.getElementById('btnStart').disabled = false;
            es.close();
            break;
          }
        }
      };

      es.onerror = () => {
        setStatus('error', 'Conexão perdida');
        document.getElementById('btnStart').disabled = false;
        es.close();
      };
    }

    async function respond(yes) {
      hideQuestion();
      appendLine(yes ? 'success' : 'warning',
        yes ? '→ Sim — iniciando scan de portas.' : '→ Não — operação cancelada.');
      await fetch('/api/answer', { method: 'POST', body: String(yes) });
    }
  </script>
</body>
</html>
