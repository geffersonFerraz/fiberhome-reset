version: 2

project_name: reset-fiber-home

before:
  hooks:
    - go mod tidy

builds:
  - id: reset-fiber-home
    builder: prebuilt
    goos:
      - linux
      - windows
    goarch:
      - amd64
    prebuilt:
      path: fyne-cross/dist/{{ .Os }}-{{ .Arch }}/{{ .ProjectName }}{{ if eq .Os "windows" }}.exe{{ end }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  groups:
    - title: Novidades
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Correções
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Outros
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
